 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Practice  </title>
 </head>
 <body>
    <div class="myDiv">
        <h2>Welcome to JavaScript Practice</h2>
        <p>Click the button below to see the magic!</p>


    </div>
    <h1>JavaScript Practice</h1>
    <p>This is a simple HTML file to practice JavaScript.</p>   
    <button id="myButton">Click Me!</button>
    <p id="text">This text will change when you click the button.</p>   

    <script>
        document.getElementById('myButton').addEventListener('click', function() {
            document.getElementById('text').style.color = 'black';
            document.getElementById('text').innerText = 'You clicked the button!';
        });
    </script>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js"></script>
 </body>
 </html>
